name: Build and Deploy to Magic Containers

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Đăng nhập vào GitHub Container Registry (ghcr.io)
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1.5. Chuyển đổi tên repository thành chữ thường để tránh lỗi GHCR (chấp nhận chữ thường)
      - name: Convert repository name to lowercase
        id: string
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      # 2. Build và đẩy image lên GitHub Packages (Sử dụng tên repo viết thường)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ steps.string.outputs.repo_lower }}:${{ github.sha }}
          platforms: linux/amd64

      # 3. Thông báo cho Magic Containers cập nhật
      - name: Update container image on Magic Containers
        uses: BunnyWay/actions/container-update-image@main
        with:
          app_id: ${{ vars.APP_ID }}
          api_key: ${{ secrets.BUNNYNET_API_KEY }}
          container: app
          image_tag: "${{ github.sha }}"
